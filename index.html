<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>今晚唔想瞓梳化 - SOFA SURVIVAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #00f2ff;
            --danger: #ff0055;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            width: 100vw; height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        #start-subtitle {
            font-size: 0.75rem;
            letter-spacing: 3px;
            opacity: 0.4;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
        }
        .start-btn:hover { background: #fff; color: #000; }

        #app {
            display: none;
            width: 100%;
            max-width: 450px;
            height: 100%;
            padding: calc(env(safe-area-inset-top) + 20px) 25px calc(env(safe-area-inset-bottom) + 20px);
            box-sizing: border-box;
            flex-direction: column;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar-info {
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        .rage-bar-bg { height: 4px; background: rgba(255,255,255,0.1); margin: 20px 0; border-radius: 2px;
                     flex-shrink: 0;
                     }

        /* ── 修正：rage 為 0 時無光暈 ── */
        #rage-fill {
            height: 100%;
            width: 0%;
            background: #ff0055;
            box-shadow: none;
            transition: width 0.4s, box-shadow 0.4s;
            border-radius: 2px;
        }
        #rage-fill.has-rage {
            box-shadow: 0 0 15px #ff0055;
        }

        /* ── 計時條：保持簡單，始終有 transition ── */
        .timer-line {
            width: 100%;
            height: 2px;
            background: #00f2ff;
            transition: width 0.1s linear;
            flex-shrink: 0; 
        }

        /* ── 用 class 控制顏色（不用 JS inline style）── */
        .timer-line.urgent {
            background: #ff0055;
        }

        #timer-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            opacity: 0.5;
            margin-top: 8px;
            text-align: right;
            transition: color 0.2s, opacity 0.2s;
        }
        #timer-text.urgent {
            color: #ff0055;
            opacity: 1;
        }

        #scenario {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 30px 0 0 0;
            min-height: 80px;
            line-height: 1.4;
        }
        #scenario-en {
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.4;
            margin: 8px 0 30px 0;
            line-height: 1.5;
        }

        .options-grid { display: grid; gap: 12px; margin-top: auto; padding-bottom: 20px; }

        .option-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 18px 20px;
            border-radius: 12px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            text-align: left;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .option-btn:active {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent) !important;
            transform: scale(0.97);
        }

        .option-en {
            display: block;
            font-size: 0.8em;
            opacity: 0.35;
            margin-top: 4px;
            font-weight: 300;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .overlay-inner {
            width: 90%;
            max-width: 320px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #status-title {
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-family: 'Syncopate';
        }
        #status-desc {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        #status-desc-en {
            font-size: 0.85rem;
            opacity: 0.35;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 300;
        }
        #rank-display {
            font-size: 1.6rem;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        #rank-display-en {
            font-size: 0.85rem;
            color: var(--accent);
            opacity: 0.5;
            margin-bottom: 45px;
            font-weight: 300;
        }

        .critical-shake { animation: shake 0.2s infinite; color: #ff0055; }
        @keyframes shake { 0%{transform:translate(1px,1px)} 50%{transform:translate(-1px,-2px)} 100%{transform:translate(1px,1px)} }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="glitch-title">今晚唔想瞓梳化</h1>
        <p id="start-subtitle">SOFA SURVIVAL</p>
        <button class="start-btn" onclick="initiateGame()">START MISSION</button>
    </div>

    <div id="app">
        <div class="top-bar">
            <div class="top-bar-info">SURVIVAL STAGE <span id="step-num">1</span>/10</div>
        </div>
        <div class="rage-bar-bg"><div id="rage-fill"></div></div>
        <div class="timer-line" id="timer-bar"></div>
        <div id="timer-text">15s</div>

        <h1 id="scenario">...</h1>
        <p id="scenario-en"></p>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="overlay" class="overlay">
        <div class="overlay-inner">
            <h2 id="status-title">STATUS</h2>
            <p id="status-desc"></p>
            <p id="status-desc-en"></p>
            <div id="rank-display"></div>
            <div id="rank-display-en"></div>
            <button id="action-btn" class="start-btn">CONTINUE</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>

    const titleText = "今晚唔想瞓梳化";
    const glitchTitle = document.getElementById('glitch-title');

    function scrambleTitle() {
        let iteration = 0;
        const letters = "ABCDEFGHIJKLMN0123456789%#$@";
        const interval = setInterval(() => {
            glitchTitle.innerText = titleText.split("").map((l, i) => {
                if (i < iteration) return titleText[i];
                return letters[Math.floor(Math.random() * letters.length)];
            }).join("");
            if (iteration >= titleText.length) clearInterval(interval);
            iteration += 1 / 3;
        }, 50);
    }
    window.onload = scrambleTitle;

    function fisherYatesShuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    const TIMER_SECONDS = 15;
    const TICK_MS       = 100;
    const TOTAL_ROUNDS  = 10;
    const URGENT_AT     = 5;

    let currentIdx       = 0;
    let rage             = 0;
    let score            = 0;
    let timerId          = null;
    let isLocked         = false;
    let isUrgent         = false;
    let popupLocked      = false;
    let sessionQuestions = [];

    function initiateGame() {
        if (typeof allQuestions === 'undefined' || allQuestions.length === 0) {
            alert('題庫載入失敗，請確認 questions.js');
            return;
        }

        const total = Math.min(TOTAL_ROUNDS, allQuestions.length);
        sessionQuestions = fisherYatesShuffle(allQuestions).slice(0, total);

        currentIdx = 0;
        rage       = 0;
        score      = 0;

        const rageFill = document.getElementById('rage-fill');
        rageFill.style.width = '0%';
        rageFill.classList.remove('has-rage');

        document.getElementById('start-screen').style.opacity = '0';

        setTimeout(() => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadQuestion();
        }, 800);
    }

    function loadQuestion() {
    clearInterval(timerId);

    if (currentIdx >= sessionQuestions.length) return finishGame();

    isLocked = false;
    isUrgent = false;

    const scenario  = document.getElementById('scenario');
    const timerBar  = document.getElementById('timer-bar');
    const timerText = document.getElementById('timer-text');

    scenario.classList.remove('critical-shake');

    // ── 修正：強制 Safari 渲染 100% ──
    timerBar.style.transition = 'none';               // ← 新增
    timerBar.classList.remove('urgent');
    timerBar.style.width = '100%';
    timerText.innerText  = TIMER_SECONDS + 's';
    timerText.classList.remove('urgent');

    void timerBar.offsetWidth;                         // ← 新增
    timerBar.style.transition = 'width 0.1s linear';   // ← 新增

    const q = sessionQuestions[currentIdx];

    document.getElementById('scenario').innerHTML = q.s;
    document.getElementById('scenario-en').innerHTML = q.se || '';
    document.getElementById('step-num').innerText = currentIdx + 1;

    const grid = document.getElementById('options');
    grid.innerHTML = '';

    q.o.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';

        const en = (q.oe && q.oe[i]) ? q.oe[i] : '';
        btn.innerHTML = en
            ? `${opt}<span class="option-en">${en}</span>`
            : opt;

        btn.onclick = () => {
            if (isLocked) return;
            isLocked = true;
            btn.blur();
            selectAnswer(i, q.a, q.f, q.fe);
        };
        grid.appendChild(btn);
    });

    startTimer();
}

    function startTimer() {
        let remaining = TIMER_SECONDS * 1000;
        const totalMs = TIMER_SECONDS * 1000;
        const timerBar  = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const scenario  = document.getElementById('scenario');

        timerId = setInterval(() => {
            remaining -= TICK_MS;
            if (remaining < 0) remaining = 0;

            const pct = (remaining / totalMs) * 100;
            timerBar.style.width = pct + '%';

            const secs = Math.ceil(remaining / 1000);
            timerText.innerText = secs + 's';

            // ── 單向切換 urgent（不閃爍）──
            if (!isUrgent && remaining <= URGENT_AT * 1000) {
                isUrgent = true;
                timerText.classList.add('urgent');
                timerBar.classList.add('urgent');
                scenario.classList.add('critical-shake');
            }

            if (remaining <= 0) {
                clearInterval(timerId);
                isLocked = true;
                handleFail(
                    "諗咁耐？你一定係喺度編緊大話！",
                    "Took too long? You must be making up a lie!"
                );
            }
        }, TICK_MS);
    }

    function selectAnswer(idx, correct, failMsg, failMsgEn) {
        clearInterval(timerId);
        if (idx === correct) {
            score++;
            showPopup(
                "SURVIVED",
                "算你識答，暫時安全。",
                "Good answer. You're safe... for now.",
                false
            );
        } else {
            handleFail(failMsg, failMsgEn || '');
        }
    }

    function handleFail(msg, msgEn) {
        clearInterval(timerId);
        rage = Math.min(rage + 10, 100);

        const rageFill = document.getElementById('rage-fill');
        rageFill.style.width = rage + "%";
        if (rage > 0) rageFill.classList.add('has-rage');

        showPopup("DANGER", msg, msgEn || '', true);
    }

    function showPopup(title, desc, descEn, isFail) {
        popupLocked = false;
        const over = document.getElementById('overlay');

        document.getElementById('status-title').innerText    = title;
        document.getElementById('status-title').style.color  = isFail ? '#ff0055' : '#00f2ff';
        document.getElementById('status-desc').innerText     = desc;
        document.getElementById('status-desc-en').innerText  = descEn;
        document.getElementById('rank-display').innerText    = '';
        document.getElementById('rank-display-en').innerText = '';
        document.getElementById('action-btn').innerText      = 'CONTINUE';
        document.getElementById('action-btn').onclick        = () => {
            if (popupLocked) return;
            popupLocked = true;
            nextLevel();
        };
        over.style.display = 'flex';
    }

    function nextLevel() {
    document.getElementById('overlay').style.display = 'none';
    currentIdx++;
    // 讓 Safari 先完成 overlay 隱藏的渲染，再載入下一題
    requestAnimationFrame(() => {
        loadQuestion();
    });
}

    function finishGame() {
        clearInterval(timerId);

        const pct = Math.round((score / sessionQuestions.length) * 100);

        let rankZh, rankEn;
        if (score >= 9) {
            rankZh = "【求生大師】你女朋友對你非常滿意";
            rankEn = "【Survival Master】Your girlfriend is very pleased.";
        } else if (score >= 6) {
    rankZh = "【資深男友】基本上可以安睡在床上";
    rankEn = "【Veteran Boyfriend】You can probably sleep on the bed tonight.";
} else if (score >= 1) {
    // 1-5 分
    rankZh = "【梳化常駐嘉賓】今晚注定瞓梳化";
    rankEn = "【Sofa Resident】The couch is your bed tonight.";
} else {
    // 0 分
    rankZh = "【你同張梳化結婚啦】月老都幫你唔到";
    rankEn = "【Marry the Sofa Instead】Even Cupid gave up on you.";
}

        document.getElementById('status-title').innerText    = "MISSION END";
        document.getElementById('status-title').style.color  = '#fff';
        document.getElementById('status-desc').innerText     = "本次求生成功率：" + pct + "%";
        document.getElementById('status-desc-en').innerText  = "Survival rate: " + pct + "%";
        document.getElementById('rank-display').innerText    = rankZh;
        document.getElementById('rank-display-en').innerText = rankEn;
        document.getElementById('action-btn').innerText      = "ONE MORE TRY";
        document.getElementById('action-btn').onclick        = () => location.reload();
        document.getElementById('overlay').style.display     = 'flex';
    }

    </script>
</body>
</html>
