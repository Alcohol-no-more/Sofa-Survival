<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>今晚唔想瞓梳化 - SOFA SURVIVAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #00f2ff;
            --danger: #ff0055;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            background: var(--bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* 啟動首頁：解構動畫區 */
        #start-screen {
            position: fixed;
            z-index: 1000;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 2rem;
            letter-spacing: 10px;
            text-align: center;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover { background: #fff; color: #000; }

        /* 遊戲主介面 */
        #app {
            display: none; /* 初始隱藏 */
            padding: calc(env(safe-area-inset-top) + 20px) 25px calc(env(safe-area-inset-bottom) + 20px);
            height: 100%;
            box-sizing: border-box;
            flex-direction: column;
        }

        .rage-bar-bg { height: 4px; background: rgba(255,255,255,0.1); margin: 20px 0; border-radius: 2px; }
        #rage-fill { height: 100%; width: 0%; background: var(--danger); box-shadow: 0 0 15px var(--danger); transition: width 0.4s; }

        #scenario { font-size: 1.8rem; font-weight: 700; margin: 40px 0; min-height: 120px; }
        .options-grid { display: grid; gap: 12px; margin-top: auto; }
        .option-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 20px; border-radius: 8px; font-size: 15px; cursor: pointer;
            outline: none !important; -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active { background: rgba(255,255,255,0.1); border-color: var(--accent) !important; transform: scale(0.97); }

        .timer-line { width: 100%; height: 2px; background: var(--accent); transition: width 0.1s linear; }

        /* 結果展示 */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: none;
            justify-content: center; align-items: center; text-align: center; padding: 40px;
        }

        .critical-shake { animation: shake 0.2s infinite; color: var(--danger); }
        @keyframes shake { 0%{transform:translate(1px,1px)} 50%{transform:translate(-1px,-2px)} 100%{transform:translate(1px,1px)} }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="glitch-title">SOFA SURVIVAL</h1>
        <button class="start-btn" onclick="initiateGame()">START MISSION</button>
    </div>

    <div id="app">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">STAGE <span id="step-num">1</span>/10</div>
        <div class="rage-bar-bg"><div id="rage-fill"></div></div>
        <div class="timer-line" id="timer-bar"></div>
        
        <h1 id="scenario">...</h1>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="overlay" class="overlay">
        <div>
            <h2 id="status-title" style="font-size: 3rem;">STATUS</h2>
            <p id="status-desc" style="margin-bottom: 30px; opacity: 0.7;"></p>
            <div id="rank-display" style="color: var(--accent); font-weight: bold; font-size: 1.5rem; margin-bottom: 40px;"></div>
            <button id="action-btn" class="start-btn" onclick="nextLevel()">CONTINUE</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        const titleText = "今晚唔想瞓梳化";
        const glitchTitle = document.getElementById('glitch-title');
        
        // 1. 解構動畫效果
        function scrambleTitle() {
            let iteration = 0;
            const letters = "ABCDEFGHIJKLMN0123456789%#$@";
            const interval = setInterval(() => {
                glitchTitle.innerText = titleText.split("").map((l, i) => {
                    if(i < iteration) return titleText[i];
                    return letters[Math.floor(Math.random() * letters.length)];
                }).join("");
                if(iteration >= titleText.length) clearInterval(interval);
                iteration += 1/3;
            }, 50);
        }
        window.onload = scrambleTitle;

        // 2. 遊戲邏輯
        let currentIdx = 0;
        let rage = 0;
        let score = 0;
        let timerId = null;

        function initiateGame() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadQuestion();
            }, 800);
        }

        function loadQuestion() {
            if (currentIdx >= 10) return finishGame(); // 每次玩10題
            
            // 從 1000 題中隨機抽取 (假設 questions.js 已加載)
            const q = allQuestions[Math.floor(Math.random() * allQuestions.length)];
            
            document.getElementById('scenario').innerHTML = q.s;
            document.getElementById('step-num').innerText = currentIdx + 1;
            const grid = document.getElementById('options');
            grid.innerHTML = '';
            
            q.o.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    btn.blur(); // 試圖修復邊框問題
                    selectAnswer(i, q.a, q.f);
                };
                grid.appendChild(btn);
            });
            startTimer();
        }

        function startTimer() {
            let left = 100;
            clearInterval(timerId);
            timerId = setInterval(() => {
                left -= 1.5;
                document.getElementById('timer-bar').style.width = left + "%";
                if(left <= 30) document.getElementById('scenario').classList.add('critical-shake');
                if(left <= 0) {
                    clearInterval(timerId);
                    handleFail("諗咁耐？你一定係喺度編緊故事！");
                }
            }, 100);
        }

        function selectAnswer(idx, correct, failMsg) {
            clearInterval(timerId);
            if(idx === correct) {
                score++;
                showPopup("SURVIVED", "暫時安全，請繼續保持。", false);
            } else {
                handleFail(failMsg);
            }
        }

        function handleFail(msg) {
            rage += 10;
            document.getElementById('rage-fill').style.width = rage + "%";
            showPopup("DANGER", msg, true);
        }

        function showPopup(title, desc, isFail) {
            const over = document.getElementById('overlay');
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-title').style.color = isFail ? '#ff0055' : '#00f2ff';
            document.getElementById('status-desc').innerText = desc;
            over.style.display = 'flex';
        }

        function nextLevel() {
            document.getElementById('overlay').style.display = 'none';
            if(currentIdx < 10) {
                currentIdx++;
                loadQuestion();
            } else {
                location.reload(); // One More Try
            }
        }

        function finishGame() {
            let rank = score >= 9 ? "【求生大師】" : score >= 6 ? "【資深男友】" : "【梳化常駐嘉賓】";
            document.getElementById('status-title').innerText = "結算";
            document.getElementById('status-desc').innerText = "本次存活率：" + (score*10) + "%";
            document.getElementById('rank-display').innerText = rank;
            document.getElementById('action-btn').innerText = "ONE MORE TRY";
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
