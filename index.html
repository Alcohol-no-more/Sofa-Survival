<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>今晚唔想瞓梳化 - SOFA SURVIVAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #00f2ff;
            --danger: #ff0055;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── 啟動首頁 ── */
        #start-screen {
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            width: 100vw; height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        #start-subtitle {
            font-size: 0.75rem;
            letter-spacing: 3px;
            opacity: 0.4;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
        }
        .start-btn:hover { background: #fff; color: #000; }

        /* ── 語言選擇 ── */
        .lang-switcher {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .lang-btn {
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 20px;
        }
        .lang-btn:hover { border-color: #fff; }
        .lang-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* ── 遊戲主介面 ── */
        #app {
            display: none;
            width: 100%;
            max-width: 450px;
            height: 100%;
            padding: calc(env(safe-area-inset-top) + 20px) 25px calc(env(safe-area-inset-bottom) + 20px);
            box-sizing: border-box;
            flex-direction: column;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .top-bar-info {
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 2px;
        }
        .lang-toggle {
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #fff;
            padding: 4px 10px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .lang-toggle:hover { opacity: 1; border-color: #fff; }

        .rage-bar-bg { height: 4px; background: rgba(255,255,255,0.1); margin: 20px 0; border-radius: 2px; }
        #rage-fill { height: 100%; width: 0%; background: var(--danger); box-shadow: 0 0 15px var(--danger); transition: width 0.4s; border-radius: 2px; }

        .timer-line { width: 100%; height: 2px; background: var(--accent); transition: width 0.1s linear; }

        #timer-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            opacity: 0.5;
            margin-top: 8px;
            text-align: right;
        }
        #timer-text.urgent { color: var(--danger); opacity: 1; }

        #scenario { font-size: 1.8rem; font-weight: 700; margin: 30px 0; min-height: 140px; line-height: 1.4; }
        .options-grid { display: grid; gap: 12px; margin-top: auto; padding-bottom: 20px; }

        .option-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 20px; border-radius: 12px; font-size: 16px; color: #fff;
            cursor: pointer; text-align: left;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .option-btn:active { background: rgba(255,255,255,0.1); border-color: var(--accent) !important; transform: scale(0.97); }

        /* ── 雙語樣式 ── */
        .dual-text .dual-secondary {
            display: block;
            font-size: 0.65em;
            opacity: 0.45;
            margin-top: 6px;
            font-weight: 300;
            line-height: 1.4;
        }
        .option-btn .dual-secondary {
            font-size: 0.8em;
            opacity: 0.4;
            margin-top: 4px;
            display: block;
            font-weight: 300;
        }

        /* ── 結果與結算畫面 ── */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .overlay-inner {
            width: 90%;
            max-width: 320px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── 結算雙語 ── */
        .result-dual {
            font-size: 0.75em;
            opacity: 0.45;
            margin-top: 6px;
            font-weight: 300;
            line-height: 1.4;
        }

        /* ── 動效 ── */
        .critical-shake { animation: shake 0.2s infinite; color: var(--danger); }
        @keyframes shake { 0%{transform:translate(1px,1px)} 50%{transform:translate(-1px,-2px)} 100%{transform:translate(1px,1px)} }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="glitch-title">今晚唔想瞓梳化</h1>
        <p id="start-subtitle">SOFA SURVIVAL</p>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" onclick="setLang('dual')">雙語</button>
            <button class="lang-btn" onclick="setLang('en')">ENG</button>
        </div>
        <button class="start-btn" onclick="initiateGame()">START MISSION</button>
    </div>

    <div id="app">
        <div class="top-bar">
            <div class="top-bar-info">SURVIVAL STAGE <span id="step-num">1</span>/10</div>
            <button class="lang-toggle" onclick="toggleLang()" id="lang-toggle-btn">雙語</button>
        </div>
        <div class="rage-bar-bg"><div id="rage-fill"></div></div>
        <div class="timer-line" id="timer-bar"></div>
        <div id="timer-text">15s</div>

        <h1 id="scenario">...</h1>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="overlay" class="overlay">
        <div class="overlay-inner">
            <h2 id="status-title" style="font-size: 2.5rem; margin-bottom: 15px; font-family: 'Syncopate';">STATUS</h2>
            <p id="status-desc" style="font-size: 1.1rem; opacity: 0.8; margin-bottom: 35px; line-height: 1.6;"></p>
            <div id="rank-display" style="font-size: 1.6rem; color: var(--accent); margin-bottom: 45px; font-weight: bold; letter-spacing: 2px;"></div>
            <button id="action-btn" class="start-btn">CONTINUE</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>

    // ═══════════════════════════════════════════════════════
    // 語言系統（支援 zh / en / dual）
    // ═══════════════════════════════════════════════════════
    let currentLang = 'zh';

    // 取得 HTML 文字（支援雙語顯示）
    function t(field) {
        if (typeof field === 'string') return field;
        if (typeof field === 'object' && field !== null) {
            if (currentLang === 'dual') {
                const zh = field.zh || '';
                const en = field.en || '';
                if (!en) return zh;
                return `${zh}<span class="dual-secondary">${en}</span>`;
            }
            return field[currentLang] || field.zh || '';
        }
        return '';
    }

    // 純文字版（用於 popup 描述）
    function tPlain(field) {
        if (typeof field === 'string') return field;
        if (typeof field === 'object' && field !== null) {
            if (currentLang === 'dual') {
                const zh = field.zh || '';
                const en = field.en || '';
                if (!en) return zh;
                return `${zh}\n${en}`;
            }
            return field[currentLang] || field.zh || '';
        }
        return '';
    }

    // 取得選項陣列（含 HTML）
    function tOptions(field) {
        if (Array.isArray(field)) return field.map(f => ({ text: f, html: f }));
        if (typeof field === 'object' && field !== null) {
            const zhArr = field.zh || [];
            const enArr = field.en || [];
            if (currentLang === 'dual') {
                return zhArr.map((zh, i) => {
                    const en = enArr[i] || '';
                    return {
                        text: zh,
                        html: en ? `${zh}<span class="dual-secondary">${en}</span>` : zh
                    };
                });
            }
            const arr = field[currentLang] || zhArr;
            return arr.map(f => ({ text: f, html: f }));
        }
        return [];
    }

    // 首頁語言選擇
    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            const map = { '中文': 'zh', '雙語': 'dual', 'ENG': 'en' };
            btn.classList.toggle('active', map[btn.textContent.trim()] === lang);
        });
        updateLangToggle();
    }

    // 遊戲中循環切換
    function toggleLang() {
        const cycle = ['zh', 'dual', 'en'];
        const idx = cycle.indexOf(currentLang);
        currentLang = cycle[(idx + 1) % cycle.length];
        updateLangToggle();
        if (currentIdx < sessionQuestions.length) {
            refreshCurrentQuestion();
        }
    }

    function updateLangToggle() {
        const labels = { zh: '雙語', dual: 'EN', en: '中文' };
        document.getElementById('lang-toggle-btn').textContent = labels[currentLang] || '雙語';
    }

    // 即時更新當前題目（不重置 timer）
    function refreshCurrentQuestion() {
        const q = sessionQuestions[currentIdx];
        document.getElementById('scenario').innerHTML = t(q.s);

        if (currentLang === 'dual') {
            document.getElementById('scenario').classList.add('dual-text');
        } else {
            document.getElementById('scenario').classList.remove('dual-text');
        }

        const grid = document.getElementById('options');
        const opts = tOptions(q.o);
        const buttons = grid.querySelectorAll('.option-btn');
        buttons.forEach((btn, i) => {
            if (opts[i]) btn.innerHTML = opts[i].html;
        });
    }

    // ═══════════════════════════════════════════════════════
    // 標題 Glitch 動效
    // ═══════════════════════════════════════════════════════
    const titleText = "今晚唔想瞓梳化";
    const glitchTitle = document.getElementById('glitch-title');

    function scrambleTitle() {
        let iteration = 0;
        const letters = "ABCDEFGHIJKLMN0123456789%#$@";
        const interval = setInterval(() => {
            glitchTitle.innerText = titleText.split("").map((l, i) => {
                if (i < iteration) return titleText[i];
                return letters[Math.floor(Math.random() * letters.length)];
            }).join("");
            if (iteration >= titleText.length) clearInterval(interval);
            iteration += 1 / 3;
        }, 50);
    }
    window.onload = scrambleTitle;

    // ═══════════════════════════════════════════════════════
    // Fisher-Yates 洗牌
    // ═══════════════════════════════════════════════════════
    function fisherYatesShuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ═══════════════════════════════════════════════════════
    // 全域狀態
    // ═══════════════════════════════════════════════════════
    const TIMER_SECONDS = 15;
    const TICK_MS       = 100;
    const TOTAL_ROUNDS  = 10;
    const URGENT_AT     = 5;

    let currentIdx       = 0;
    let rage             = 0;
    let score            = 0;
    let timerId          = null;
    let isLocked         = false;
    let sessionQuestions = [];

    // ═══════════════════════════════════════════════════════
    // UI 文字（根據語言）
    // ═══════════════════════════════════════════════════════
    const UI = {
        survived:     { zh: "SURVIVED",    en: "SURVIVED" },
        survivedMsg:  { zh: "算你識答，暫時安全。",   en: "Good answer. You're safe... for now." },
        danger:       { zh: "DANGER",      en: "DANGER" },
        timeout:      { zh: "諗咁耐？你一定係喺度編緊大話！", en: "Took too long? You must be making up a lie!" },
        continue:     { zh: "繼續",        en: "CONTINUE" },
        missionEnd:   { zh: "MISSION END", en: "MISSION END" },
        survivalRate: { zh: "本次求生成功率：",  en: "Survival rate: " },
        oneMore:      { zh: "再嚟一次",    en: "ONE MORE TRY" },
        rank1:        { zh: "【求生大師】\n你女朋友對你非常滿意",
                        en: "【Survival Master】\nYour girlfriend is very pleased." },
        rank2:        { zh: "【資深男友】\n基本上可以安睡在床上",
                        en: "【Veteran Boyfriend】\nYou can probably sleep on the bed tonight." },
        rank3:        { zh: "【梳化常駐嘉賓】\n今晚注定瞓梳化",
                        en: "【Sofa Resident】\nThe couch is your bed tonight." }
    };

    function ui(key) {
        const item = UI[key];
        if (!item) return '';
        if (currentLang === 'dual') {
            const zh = item.zh || '';
            const en = item.en || '';
            if (!en) return zh;
            return `${zh}\n${en}`;
        }
        return item[currentLang] || item.zh || '';
    }

    // HTML 版本的 ui（用於需要換行的地方）
    function uiHtml(key) {
        const item = UI[key];
        if (!item) return '';
        if (currentLang === 'dual') {
            const zh = item.zh || '';
            const en = item.en || '';
            if (!en) return zh;
            return `${zh}<br><span class="result-dual">${en}</span>`;
        }
        return item[currentLang] || item.zh || '';
    }

    // ═══════════════════════════════════════════════════════
    // 開始遊戲
    // ═══════════════════════════════════════════════════════
    function initiateGame() {
        if (typeof allQuestions === 'undefined' || allQuestions.length === 0) {
            alert('題庫載入失敗，請確認 questions.js');
            return;
        }

        const total = Math.min(TOTAL_ROUNDS, allQuestions.length);
        sessionQuestions = fisherYatesShuffle(allQuestions).slice(0, total);

        currentIdx = 0;
        rage       = 0;
        score      = 0;

        document.getElementById('rage-fill').style.width = '0%';
        document.getElementById('start-screen').style.opacity = '0';

        setTimeout(() => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadQuestion();
        }, 800);
    }

    // ═══════════════════════════════════════════════════════
    // 載入題目
    // ═══════════════════════════════════════════════════════
    function loadQuestion() {
        if (currentIdx >= sessionQuestions.length) return finishGame();

        isLocked = false;
        document.getElementById('scenario').classList.remove('critical-shake');

        const q = sessionQuestions[currentIdx];
        document.getElementById('scenario').innerHTML = t(q.s);
        document.getElementById('step-num').innerText = currentIdx + 1;

        if (currentLang === 'dual') {
            document.getElementById('scenario').classList.add('dual-text');
        } else {
            document.getElementById('scenario').classList.remove('dual-text');
        }

        const grid = document.getElementById('options');
        grid.innerHTML = '';

        const opts = tOptions(q.o);
        opts.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = opt.html;
            btn.onclick = () => {
                if (isLocked) return;
                isLocked = true;
                btn.blur();
                selectAnswer(i, q.a, q.f);
            };
            grid.appendChild(btn);
        });

        startTimer();
    }

    // ═══════════════════════════════════════════════════════
    // 15 秒計時器
    // ═══════════════════════════════════════════════════════
    function startTimer() {
        let remaining = TIMER_SECONDS * 1000;
        const totalMs = TIMER_SECONDS * 1000;
        const timerBar  = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const scenario  = document.getElementById('scenario');

        timerBar.style.width = '100%';
        timerText.innerText  = TIMER_SECONDS + 's';
        timerText.classList.remove('urgent');
        timerBar.style.background = 'var(--accent)';

        clearInterval(timerId);

        timerId = setInterval(() => {
            remaining -= TICK_MS;
            if (remaining < 0) remaining = 0;

            const pct = (remaining / totalMs) * 100;
            timerBar.style.width = pct + '%';

            const secs = Math.ceil(remaining / 1000);
            timerText.innerText = secs + 's';

            if (secs <= URGENT_AT) {
                timerText.classList.add('urgent');
                timerBar.style.background = 'var(--danger)';
                scenario.classList.add('critical-shake');
            } else {
                timerText.classList.remove('urgent');
                timerBar.style.background = 'var(--accent)';
                scenario.classList.remove('critical-shake');
            }

            if (remaining <= 0) {
                clearInterval(timerId);
                isLocked = true;
                handleFail(ui('timeout'));
            }
        }, TICK_MS);
    }

    // ═══════════════════════════════════════════════════════
    // 答題邏輯
    // ═══════════════════════════════════════════════════════
    function selectAnswer(idx, correct, failField) {
        clearInterval(timerId);
        if (idx === correct) {
            score++;
            showPopup(ui('survived'), ui('survivedMsg'), false);
        } else {
            handleFail(tPlain(failField));
        }
    }

    function handleFail(msg) {
        rage = Math.min(rage + 10, 100);
        document.getElementById('rage-fill').style.width = rage + "%";
        showPopup(ui('danger'), msg, true);
    }

    // ═══════════════════════════════════════════════════════
    // 彈窗
    // ═══════════════════════════════════════════════════════
    function showPopup(title, desc, isFail) {
        const over    = document.getElementById('overlay');
        const titleEl = document.getElementById('status-title');

        titleEl.innerText   = title;
        titleEl.style.color = isFail ? '#ff0055' : '#00f2ff';
        document.getElementById('status-desc').innerText  = desc;
        document.getElementById('rank-display').innerHTML = '';
        document.getElementById('action-btn').innerText   = ui('continue');
        document.getElementById('action-btn').onclick     = nextLevel;
        over.style.display = 'flex';
    }

    function nextLevel() {
        document.getElementById('overlay').style.display = 'none';
        currentIdx++;
        loadQuestion();
    }

    // ═══════════════════════════════════════════════════════
    // 結算
    // ═══════════════════════════════════════════════════════
    function finishGame() {
        clearInterval(timerId);

        const pct  = Math.round((score / sessionQuestions.length) * 100);
        const rank = score >= 9  ? uiHtml('rank1')
                   : score >= 6  ? uiHtml('rank2')
                                 : uiHtml('rank3');

        document.getElementById('status-title').innerText   = ui('missionEnd');
        document.getElementById('status-title').style.color = '#fff';
        document.getElementById('status-desc').innerText    = ui('survivalRate') + pct + "%";
        document.getElementById('rank-display').innerHTML   = rank;
        document.getElementById('action-btn').innerText     = ui('oneMore');
        document.getElementById('action-btn').onclick       = () => location.reload();
        document.getElementById('overlay').style.display    = 'flex';
    }

    </script>
</body>
</html>
