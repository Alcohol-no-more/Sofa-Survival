<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>今晚唔想瞓梳化 - SOFA SURVIVAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --accent: #00f2ff;
            --danger: #ff0055;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* 1. 基礎鎖死與置中環境 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 啟動首頁 */
        #start-screen {
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            width: 100vw; height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 8px;
            text-align: center;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .start-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
        }

        .start-btn:hover { background: #fff; color: #000; }

        /* 3. 遊戲主介面 - 確保內容居中且寬度自適應 */
        #app {
            display: none;
            width: 100%;
            max-width: 450px;
            height: 100%;
            padding: calc(env(safe-area-inset-top) + 20px) 25px calc(env(safe-area-inset-bottom) + 20px);
            box-sizing: border-box;
            flex-direction: column;
            z-index: 10;
        }

        .rage-bar-bg { height: 4px; background: rgba(255,255,255,0.1); margin: 20px 0; border-radius: 2px; }
        #rage-fill { height: 100%; width: 0%; background: var(--danger); box-shadow: 0 0 15px var(--danger); transition: width 0.4s; }
        .timer-line { width: 100%; height: 2px; background: var(--accent); transition: width 0.1s linear; }

        #scenario { font-size: 1.8rem; font-weight: 700; margin: 40px 0; min-height: 140px; line-height: 1.4; }
        .options-grid { display: grid; gap: 12px; margin-top: auto; padding-bottom: 20px; }
        
        .option-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1) !important;
            padding: 20px; border-radius: 12px; font-size: 16px; color: #fff;
            cursor: pointer; text-align: left;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s;
        }
        .option-btn:active { background: rgba(255,255,255,0.1); border-color: var(--accent) !important; transform: scale(0.97); }

        /* 4. 結果與結算畫面 - 絕對物理置中 */
        .overlay {
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.98); 
            z-index: 9999; 
            display: none;
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .overlay-inner {
            width: 90%;
            max-width: 320px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 動效 */
        .critical-shake { animation: shake 0.2s infinite; color: var(--danger); }
        @keyframes shake { 0%{transform:translate(1px,1px)} 50%{transform:translate(-1px,-2px)} 100%{transform:translate(1px,1px)} }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="glitch-title">今晚唔想瞓梳化</h1>
        <button class="start-btn" onclick="initiateGame()">START MISSION</button>
    </div>

    <div id="app">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">SURVIVAL STAGE <span id="step-num">1</span>/10</div>
        <div class="rage-bar-bg"><div id="rage-fill"></div></div>
        <div class="timer-line" id="timer-bar"></div>
        
        <h1 id="scenario">...</h1>
        <div class="options-grid" id="options"></div>
    </div>

    <div id="overlay" class="overlay">
        <div class="overlay-inner">
            <h2 id="status-title" style="font-size: 2.5rem; margin-bottom: 15px; font-family: 'Syncopate';">STATUS</h2>
            <p id="status-desc" style="font-size: 1.1rem; opacity: 0.8; margin-bottom: 35px; line-height: 1.6;"></p>
            <div id="rank-display" style="font-size: 1.6rem; color: var(--accent); margin-bottom: 45px; font-weight: bold; letter-spacing: 2px;"></div>
            <button id="action-btn" class="start-btn" onclick="nextLevel()">CONTINUE</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script>
        const titleText = "今晚唔想瞓梳化";
        const glitchTitle = document.getElementById('glitch-title');
        
        function scrambleTitle() {
            let iteration = 0;
            const letters = "ABCDEFGHIJKLMN0123456789%#$@";
            const interval = setInterval(() => {
                glitchTitle.innerText = titleText.split("").map((l, i) => {
                    if(i < iteration) return titleText[i];
                    return letters[Math.floor(Math.random() * letters.length)];
                }).join("");
                if(iteration >= titleText.length) clearInterval(interval);
                iteration += 1/3;
            }, 50);
        }
        window.onload = scrambleTitle;

        let currentIdx = 0;
        let rage = 0;
        let score = 0;
        let timerId = null;

        function initiateGame() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadQuestion();
            }, 800);
        }

        function loadQuestion() {
            if (currentIdx >= 10) return finishGame();
            
            // 確保 allQuestions 存在
            const q = (typeof allQuestions !== 'undefined') ? 
                      allQuestions[Math.floor(Math.random() * allQuestions.length)] : 
                      {s:"(請先在questions.js加入題目)", o:["選項A","選項B","選項C","選項D"], a:0, f:"錯誤"};
            
            document.getElementById('scenario').innerHTML = q.s;
            document.getElementById('step-num').innerText = currentIdx + 1;
            const grid = document.getElementById('options');
            grid.innerHTML = '';
            
            q.o.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    btn.blur();
                    selectAnswer(i, q.a, q.f);
                };
                grid.appendChild(btn);
            });
            startTimer();
        }

        function startTimer() {
            let left = 100;
            clearInterval(timerId);
            timerId = setInterval(() => {
                left -= 1.4;
                document.getElementById('timer-bar').style.width = left + "%";
                if(left <= 30) document.getElementById('scenario').classList.add('critical-shake');
                else document.getElementById('scenario').classList.remove('critical-shake');
                
                if(left <= 0) {
                    clearInterval(timerId);
                    handleFail("諗咁耐？你一定係喺度編緊大話！");
                }
            }, 100);
        }

        function selectAnswer(idx, correct, failMsg) {
            clearInterval(timerId);
            if(idx === correct) {
                score++;
                showPopup("SURVIVED", "算你識答，暫時安全。", false);
            } else {
                handleFail(failMsg);
            }
        }

        function handleFail(msg) {
            rage += 10;
            document.getElementById('rage-fill').style.width = rage + "%";
            showPopup("DANGER", msg, true);
        }

        function showPopup(title, desc, isFail) {
            const over = document.getElementById('overlay');
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-title').style.color = isFail ? '#ff0055' : '#00f2ff';
            document.getElementById('status-desc').innerText = desc;
            over.style.display = 'flex';
        }

        function nextLevel() {
            document.getElementById('overlay').style.display = 'none';
            if(currentIdx < 10) {
                currentIdx++;
                loadQuestion();
            } else {
                location.reload();
            }
        }

        function finishGame() {
            let rank = score >= 9 ? "【求生大師】" : score >= 6 ? "【資深男友】" : "【梳化常駐嘉賓】";
            document.getElementById('status-title').innerText = "MISSION END";
            document.getElementById('status-desc').innerText = "本次求生成功率：" + (score*10) + "%";
            document.getElementById('rank-display').innerText = rank;
            document.getElementById('action-btn').innerText = "ONE MORE TRY";
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
